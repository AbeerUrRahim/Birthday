<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Surprise for Kanwal!</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Parisienne&family=Quicksand:wght@300;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            perspective: 1000px;
        }

        #start-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,223,235,0.8) 0%, rgba(255,182,193,0.9) 30%, rgba(221,160,221,1) 100%);
            background-size: cover;
            animation: pulseBackground 10s infinite alternate;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 100;
            opacity: 1;
            transition: opacity 1.5s ease-out;
        }

        @keyframes pulseBackground {
            0% { background-color: #ffdde1; }
            100% { background-color: #ee9ca7; }
        }

        #surprise-button {
            padding: 20px 40px;
            font-size: 1.8em;
            font-family: 'Parisienne', cursive;
            color: #fff;
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 105, 180, 0.5), 0 0 15px rgba(255,255,255,0.5) inset;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: floatButton 3s infinite ease-in-out;
        }

        #surprise-button:hover {
            transform: scale(1.1) translateY(-5px);
            box-shadow: 0 15px 35px rgba(255, 105, 180, 0.7), 0 0 20px rgba(255,255,255,0.7) inset;
        }

        @keyframes floatButton {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            font-size: clamp(1.5em, 5vw, 3em);
            font-family: 'Parisienne', cursive;
            color: #fff;
            text-shadow: 0 0 10px #ff69b4, 0 0 20px #ff69b4, 0 0 30px #ffc0cb, 0 0 40px #ffc0cb;
            opacity: 0;
            transition: opacity 1s ease-in-out, transform 1s ease-in-out;
            z-index: 50;
            text-align: center;
            pointer-events: none;
            width: 90%;
        }

        .message.visible {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        #birthday-message { top: 20%; }
        #gift-message { top: 30%; }
        #final-message { top: 70%; }

        #three-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0;
            transition: opacity 1.5s ease-in;
        }
        #three-canvas.visible { opacity: 1; }

        /* ===== SEE OUR MOMENTS BUTTON ===== */
        #moments-btn {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            padding: 16px 36px;
            font-size: clamp(1em, 4vw, 1.4em);
            font-family: 'Parisienne', cursive;
            color: #fff;
            background: linear-gradient(135deg, #c0392b 0%, #e91e8c 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(233, 30, 140, 0.5);
            z-index: 60;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease, transform 0.3s ease, box-shadow 0.3s ease;
            white-space: nowrap;
            animation: floatButton 3s infinite ease-in-out;
        }
        #moments-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }
        #moments-btn:hover {
            transform: translateX(-50%) scale(1.08);
            box-shadow: 0 12px 30px rgba(233, 30, 140, 0.7);
        }
        #moments-btn:active {
            transform: translateX(-50%) scale(0.97);
        }

        /* ===== PHOTO OVERLAY ===== */
        #photo-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 0, 20, 0.97);
            z-index: 999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        #photo-overlay.open { display: flex; }

        #overlay-title {
            font-family: 'Parisienne', cursive;
            font-size: clamp(1.6em, 6vw, 2.8em);
            color: #ffb6d9;
            text-shadow: 0 0 15px #ff69b4;
            margin: 0 0 16px 0;
            text-align: center;
            padding: 0 16px;
            flex-shrink: 0;
        }

        #photo-frame {
            width: min(90vw, 480px);
            max-height: 55vh;
            border-radius: 18px;
            border: 3px solid #ff69b4;
            box-shadow: 0 0 30px rgba(255,105,180,0.5);
            object-fit: cover;
            display: block;
            flex-shrink: 0;
        }

        #photo-caption {
            font-family: 'Parisienne', cursive;
            font-size: clamp(1em, 3.5vw, 1.5em);
            color: #ffd6ea;
            text-align: center;
            margin: 14px 20px 0;
            flex-shrink: 0;
        }

        #close-overlay-btn {
            margin-top: 18px;
            padding: 12px 32px;
            font-size: clamp(0.9em, 3vw, 1.1em);
            font-family: 'Parisienne', cursive;
            color: #fff;
            background: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(255, 105, 180, 0.4);
            flex-shrink: 0;
            transition: transform 0.2s;
        }
        #close-overlay-btn:active { transform: scale(0.95); }

        /* floating hearts in overlay */
        .heart-float {
            position: absolute;
            font-size: 1.4em;
            animation: heartRise 4s infinite ease-in;
            opacity: 0;
            pointer-events: none;
        }
        @keyframes heartRise {
            0%   { opacity: 0; transform: translateY(0) scale(0.8); }
            20%  { opacity: 0.9; }
            100% { opacity: 0; transform: translateY(-80vh) scale(1.2); }
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <button id="surprise-button">Click Me for a Surprise</button>
    </div>

    <div id="birthday-message" class="message">Happy Birthday My Princess!</div>
    <div id="gift-message" class="message">Click the Gift Box Plzzzzz</div>
    <div id="final-message" class="message">This is for you, Myyy Loveeeee Hehe.</div>

    <!-- SEE OUR MOMENTS BUTTON (appears after gift opens) -->
    <button id="moments-btn">💖 See Our Moments</button>

    <!-- PHOTO OVERLAY -->
    <div id="photo-overlay">
        <p id="overlay-title">Our Beautiful Moments 💕</p>
        <!-- REPLACE src below with your actual photo path/URL e.g. src="photo.jpg" -->
        <img id="photo-frame" src="photo.jpeg" alt="Our moment together"
             onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22300%22%3E%3Crect width=%22400%22 height=%22300%22 fill=%22%23330022%22/%3E%3Ctext x=%2250%25%22 y=%2240%25%22 text-anchor=%22middle%22 fill=%22%23ff69b4%22 font-size=%2226%22 font-family=%22Georgia%22%3EAdd your photo here%3C/text%3E%3Ctext x=%2250%25%22 y=%2258%25%22 text-anchor=%22middle%22 fill=%22%23ffa0c8%22 font-size=%2216%22 font-family=%22Georgia%22%3EReplace src=&apos;photo.jpg&apos; with%3C/text%3E%3Ctext x=%2250%25%22 y=%2270%25%22 text-anchor=%22middle%22 fill=%22%23ffa0c8%22 font-size=%2216%22 font-family=%22Georgia%22%3Eyour actual image path%3C/text%3E%3Ctext x=%2250%25%22 y=%2285%25%22 text-anchor=%22middle%22 fill=%22%23ff69b4%22 font-size=%2230%22%3E%F0%9F%92%96%3C/text%3E%3C/svg%3E'" />
        <p id="photo-caption">Every moment with you is a treasure 💓</p>
        <button id="close-overlay-btn">Close ✕</button>
    </div>

    <canvas id="three-canvas"></canvas>
    <audio id="bg-music" src="music.mp3" loop></audio>

    <script>
        let scene, camera, renderer, clock;
        let cake, cakeSlice, giftBox, lid, flowerBouquet;
        let currentStage = 0;
        let animationProgress = 0;
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        const startScreen    = document.getElementById('start-screen');
        const surpriseButton = document.getElementById('surprise-button');
        const birthdayMessage= document.getElementById('birthday-message');
        const giftMessage    = document.getElementById('gift-message');
        const finalMessage   = document.getElementById('final-message');
        const audioElement   = document.getElementById('bg-music');
        const threeCanvas    = document.getElementById('three-canvas');
        const momentsBtn     = document.getElementById('moments-btn');
        const photoOverlay   = document.getElementById('photo-overlay');
        const closeOverlayBtn= document.getElementById('close-overlay-btn');

        surpriseButton.addEventListener('click', startSurprise);
        window.addEventListener('resize', onWindowResize, false);
        threeCanvas.addEventListener('click', onCanvasClick, false);

        momentsBtn.addEventListener('click', () => {
            photoOverlay.classList.add('open');
            spawnHearts();
        });
        closeOverlayBtn.addEventListener('click', () => {
            photoOverlay.classList.remove('open');
        });

        function spawnHearts() {
            const hearts = ['💖','💕','💗','💓','❤️','🌸'];
            for (let i = 0; i < 12; i++) {
                setTimeout(() => {
                    const h = document.createElement('span');
                    h.className = 'heart-float';
                    h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
                    h.style.left = (10 + Math.random() * 80) + 'vw';
                    h.style.bottom = '5vh';
                    h.style.animationDelay = (Math.random() * 0.5) + 's';
                    h.style.animationDuration = (3 + Math.random() * 2) + 's';
                    photoOverlay.appendChild(h);
                    setTimeout(() => h.remove(), 5000);
                }, i * 200);
            }
        }

        function initThree() {
            clock = new THREE.Clock();
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x4a004a);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;
            camera.position.y = 5;

            renderer = new THREE.WebGLRenderer({ canvas: threeCanvas, antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            const pointLight = new THREE.PointLight(0xffd1dc, 1.2, 100);
            pointLight.position.set(5, 15, 10);
            pointLight.castShadow = true;
            scene.add(pointLight);
            const directionalLight = new THREE.DirectionalLight(0xffe4e1, 0.7);
            directionalLight.position.set(-10, 10, 5);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            const planeGeometry = new THREE.PlaneGeometry(50, 50);
            const planeMaterial = new THREE.ShadowMaterial({ opacity: 0.3 });
            const plane = new THREE.Mesh(planeGeometry, planeMaterial);
            plane.rotation.x = -Math.PI / 2;
            plane.position.y = -5;
            plane.receiveShadow = true;
            scene.add(plane);

            animate();
        }

        function startSurprise() {
            startScreen.style.opacity = '0';
            setTimeout(() => { startScreen.style.display = 'none'; }, 1500);
            audioElement.play().catch(e => console.error("Audio play failed:", e));
            threeCanvas.classList.add('visible');
            if (!renderer) initThree();
            currentStage = 1;
            createCake();
            setTimeout(() => { birthdayMessage.classList.add('visible'); }, 500);
        }

        function createCake() {
            const cakeMaterial  = new THREE.MeshStandardMaterial({ color: 0xffb6c1, roughness: 0.3, metalness: 0.1 });
            const icingMaterial = new THREE.MeshStandardMaterial({ color: 0xfff0f5, roughness: 0.2, metalness: 0.0 });
            cake = new THREE.Group();

            const layer1 = new THREE.Mesh(new THREE.CylinderGeometry(3, 3, 1.5, 32), cakeMaterial);
            layer1.castShadow = true; layer1.receiveShadow = true;
            cake.add(layer1);

            const layer2 = new THREE.Mesh(new THREE.CylinderGeometry(2.5, 2.5, 1.5, 32), cakeMaterial);
            layer2.position.y = 1.5;
            layer2.castShadow = true; layer2.receiveShadow = true;
            cake.add(layer2);

            for (let i = 0; i < 16; i++) {
                const dripGeom = new THREE.SphereGeometry(0.3, 16, 16);
                const angle = (i / 16) * Math.PI * 2;
                const drip = new THREE.Mesh(dripGeom, icingMaterial);
                drip.position.set(Math.cos(angle) * 2.8, 0.6, Math.sin(angle) * 2.8);
                layer1.add(drip);
                const drip2 = new THREE.Mesh(dripGeom, icingMaterial);
                drip2.position.set(Math.cos(angle) * 2.3, 2.1, Math.sin(angle) * 2.3);
                layer2.add(drip2);
            }

            const sliceShape = new THREE.Shape();
            sliceShape.moveTo(0, 0);
            sliceShape.lineTo(2, 0);
            sliceShape.arc(0, 0, 2, 0, Math.PI / 6, false);
            sliceShape.lineTo(0, 0);
            const extrudeSettings = { depth: 1.4, bevelEnabled: false };
            cakeSlice = new THREE.Mesh(
                new THREE.ExtrudeGeometry(sliceShape, extrudeSettings),
                new THREE.MeshStandardMaterial({ color: 0xf4a460, roughness: 0.5, metalness: 0.1 })
            );
            cakeSlice.castShadow = true; cakeSlice.receiveShadow = true;
            cakeSlice.rotation.x = -Math.PI / 2;
            cakeSlice.rotation.z = -Math.PI / 12;
            cakeSlice.position.set(100, 100, 100);
            cake.add(cakeSlice);

            cake.position.y = -2;
            scene.add(cake);
            camera.lookAt(cake.position);
        }

        function createGiftBox() {
            giftBox = new THREE.Group();
            const boxMaterial    = new THREE.MeshStandardMaterial({ color: 0xdb7093, roughness: 0.4, metalness: 0.2 });
            const ribbonMaterial = new THREE.MeshStandardMaterial({ color: 0xffd700, roughness: 0.2, metalness: 0.5 });

            const base = new THREE.Mesh(new THREE.BoxGeometry(4, 3, 4), boxMaterial);
            base.castShadow = true; base.receiveShadow = true;
            giftBox.add(base);

            lid = new THREE.Mesh(new THREE.BoxGeometry(4.2, 1, 4.2), boxMaterial);
            lid.position.y = 1.5 + 0.5;
            lid.castShadow = true; lid.receiveShadow = true;

            const rt = 0.1, rw = 0.5;
            const rvl = new THREE.Mesh(new THREE.BoxGeometry(rw, 1 + rt, 4.2 + rt), ribbonMaterial);
            lid.add(rvl);
            const rhl = new THREE.Mesh(new THREE.BoxGeometry(4.2 + rt, 1 + rt, rw), ribbonMaterial);
            lid.add(rhl);

            const rvb = new THREE.Mesh(new THREE.BoxGeometry(rw, 3 + rt, 4 + rt), ribbonMaterial);
            base.add(rvb);
            const rhb = new THREE.Mesh(new THREE.BoxGeometry(4 + rt, 3 + rt, rw), ribbonMaterial);
            base.add(rhb);

            const bowLoopGeom = new THREE.TorusGeometry(0.5, 0.15, 8, 20);
            const bowLoop1 = new THREE.Mesh(bowLoopGeom, ribbonMaterial);
            bowLoop1.position.set(-0.4, 0.55, 0);
            bowLoop1.rotation.y = Math.PI / 4;
            lid.add(bowLoop1);
            const bowLoop2 = new THREE.Mesh(bowLoopGeom, ribbonMaterial);
            bowLoop2.position.set(0.4, 0.55, 0);
            bowLoop2.rotation.y = -Math.PI / 4;
            lid.add(bowLoop2);
            const bowCenter = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8), ribbonMaterial);
            bowCenter.position.y = 0.55;
            lid.add(bowCenter);

            giftBox.add(lid);
            giftBox.position.y = -2;
            giftBox.visible = false;
            scene.add(giftBox);
        }

        function createFlowerBouquet() {
            flowerBouquet = new THREE.Group();
            const stemMaterial  = new THREE.MeshStandardMaterial({ color: 0x228B22, roughness: 0.6 });
            const flowerColors  = [0xff69b4, 0xff1493, 0xda70d6, 0xffb6c1];

            for (let i = 0; i < 15; i++) {
                const fg = new THREE.Group();
                const stemHeight = Math.random() * 2 + 2;
                const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.08, stemHeight, 8), stemMaterial);
                stem.position.y = stemHeight / 2;
                fg.add(stem);
                const fh = new THREE.Mesh(
                    new THREE.SphereGeometry(Math.random() * 0.3 + 0.4, 16, 16),
                    new THREE.MeshStandardMaterial({ color: flowerColors[Math.floor(Math.random() * flowerColors.length)], roughness: 0.4, metalness: 0.1 })
                );
                fh.position.y = stemHeight + 0.3;
                fh.castShadow = true;
                fg.add(fh);
                fg.position.set((Math.random() - 0.5) * 1.5, 0, (Math.random() - 0.5) * 1.5);
                fg.rotation.x = (Math.random() - 0.5) * 0.3;
                fg.rotation.z = (Math.random() - 0.5) * 0.3;
                flowerBouquet.add(fg);
            }

            flowerBouquet.position.set(0, -1, 0);
            flowerBouquet.scale.set(0.1, 0.1, 0.1);
            flowerBouquet.visible = false;
            giftBox.add(flowerBouquet);
        }

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            animationProgress += delta;

            if (cake) cake.rotation.y += delta * 0.2;

            // Stage 1: Cake
            if (currentStage === 1 && cakeSlice) {
                if (animationProgress < 0.5) {
                    if (cakeSlice.position.x > 50) {
                        cakeSlice.position.set(0.4, 0.75, 0);
                        cakeSlice.rotation.set(-Math.PI / 2, 0, -Math.PI / 12);
                    }
                } else if (animationProgress < 3.5) {
                    if (cakeSlice.parent === cake) {
                        cake.remove(cakeSlice);
                        scene.add(cakeSlice);
                        cake.getWorldPosition(cakeSlice.position);
                        cake.getWorldQuaternion(cakeSlice.quaternion);
                        cakeSlice.position.x += 0.4 * Math.cos(cake.rotation.y - Math.PI / 12);
                        cakeSlice.position.z += 0.4 * Math.sin(cake.rotation.y - Math.PI / 12);
                        cakeSlice.position.y += 0.75;
                        cakeSlice.rotation.y = cake.rotation.y - Math.PI / 12;
                        cakeSlice.rotation.x = -Math.PI / 2;
                    }
                    const moveSpeed = 0.5;
                    cakeSlice.position.x += Math.cos(cake.rotation.y - Math.PI / 12) * moveSpeed * delta;
                    cakeSlice.position.z += Math.sin(cake.rotation.y - Math.PI / 12) * moveSpeed * delta;
                    cakeSlice.position.y -= 0.1 * delta;
                    cakeSlice.rotation.z -= 0.2 * delta;
                } else if (animationProgress >= 3.5 && currentStage === 1) {
                    birthdayMessage.classList.remove('visible');
                    if (cake) scene.remove(cake);
                    if (cakeSlice) scene.remove(cakeSlice);
                    cake = null; cakeSlice = null;
                    currentStage = 2;
                    createGiftBox();
                    giftBox.visible = true;
                    camera.position.set(0, 3, 10);
                    camera.lookAt(giftBox.position);
                    giftMessage.classList.add('visible');
                    animationProgress = 0;
                }
            }

            // Stage 3: Gift open
            if (currentStage === 3 && lid) {
                if (animationProgress < 2) {
                    lid.rotation.x = Math.min(lid.rotation.x + delta * (Math.PI / 2), Math.PI * 0.7);
                    lid.position.z -= delta * 0.8;
                    lid.position.y += delta * 0.3;
                } else {
                    currentStage = 4;
                    createFlowerBouquet();
                    flowerBouquet.visible = true;
                    animationProgress = 0;
                }
            }

            // Stage 4: Flower reveal
            if (currentStage === 4 && flowerBouquet) {
                if (animationProgress < 3) {
                    flowerBouquet.position.y = Math.min(flowerBouquet.position.y + delta * 1.5, 3);
                    const scale = Math.min(flowerBouquet.scale.x + delta * 0.5, 1);
                    flowerBouquet.scale.set(scale, scale, scale);
                } else if (animationProgress >= 3 && currentStage === 4) {
                    currentStage = 5;
                    finalMessage.classList.add('visible');
                    // Show the moments button after a short delay
                    setTimeout(() => { momentsBtn.classList.add('visible'); }, 1200);
                }
            }

            // Stage 5: Gentle sway
            if (currentStage === 5 && flowerBouquet) {
                flowerBouquet.rotation.y += delta * 0.1;
                flowerBouquet.rotation.x = Math.sin(clock.elapsedTime * 0.5) * 0.05;
            }

            if (renderer) renderer.render(scene, camera);
        }

        function onWindowResize() {
            if (camera && renderer) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        }

        function onCanvasClick(event) {
            if (currentStage !== 2 || !giftBox || !lid) return;
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects([lid, ...giftBox.children.filter(c => c !== lid)], true);
            if (intersects.length > 0) {
                let hit = false;
                for (let i = 0; i < intersects.length; i++) {
                    if (intersects[i].object === lid || giftBox.children.includes(intersects[i].object)) {
                        hit = true; break;
                    }
                }
                if (hit) {
                    giftMessage.classList.remove('visible');
                    currentStage = 3;
                    animationProgress = 0;
                }
            }
        }
    </script>
</body>
</html>
